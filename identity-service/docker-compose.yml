services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity_password
    ports:
      - "5434:5432"
    volumes:
      - identity_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity -d identity"]
      interval: 5s
      timeout: 5s
      retries: 20

  identity:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://identity:identity_password@postgres:5432/identity
    ports:
      - "8020:8020"
    depends_on:
      postgres:
        condition: service_healthy

  identity-web:
    build:
      context: ./frontend
    environment:
      VITE_PROXY_TARGET: http://identity:8020
    ports:
      - "5177:5177"
    depends_on:
      - identity

volumes:
  identity_postgres_data:
